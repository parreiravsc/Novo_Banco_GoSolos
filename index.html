<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoSolos - Gestor de Bancos JSON</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --accent-ed1: #8e44ad;
            --accent-ed2: #ff8c00;
            --success: #28a745;
            --danger: #dc3545;
            --border: #ccc;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }

        .nav-tabs { display: flex; gap: 5px; max-width: 1200px; margin: 0 auto; }
        .tab-button {
            padding: 12px 25px; border: none; border-radius: 8px 8px 0 0;
            cursor: pointer; font-weight: bold; background: #d1d8e0; color: #4b6584; transition: 0.3s;
        }
        .tab-button.active { background: var(--card-bg); box-shadow: 0 -3px 10px rgba(0,0,0,0.1); }
        .tab-button.active.btn-ed1 { color: var(--accent-ed1); border-top: 4px solid var(--accent-ed1); }
        .tab-button.active.btn-ed2 { color: var(--accent-ed2); border-top: 4px solid var(--accent-ed2); }

        .container {
            max-width: 1200px; margin: 0 auto; background: var(--card-bg);
            padding: 30px; border-radius: 0 0 12px 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .section { margin-bottom: 25px; padding: 20px; border-radius: 8px; border: 1px solid var(--border); position: relative; }
        .form-group { margin-bottom: 12px; }
        
        .grid-params { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 15px; }
        .grid-pat { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
        
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 0.85em; color: #444; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }
        textarea { min-height: 70px; font-family: sans-serif; font-size: 12px; resize: vertical; }
        
        button { padding: 8px 15px; border-radius: 4px; cursor: pointer; border: none; font-weight: bold; color: white; }
        .btn-add { background-color: var(--primary); }
        .btn-save { background-color: var(--success); }
        .btn-load { background-color: #3498db; }
        .btn-remove { background-color: var(--danger); position: absolute; top: 15px; right: 15px; padding: 5px 10px; z-index: 10; }

        .patogeno-full-card { border-left: 6px solid var(--accent-ed1); background: #faf8ff; }
        .doenca-section { border: 2px solid var(--accent-ed2); background: #fffaf5; }
        .cultura-section { border: 2px solid var(--success); background: #f6fff6; margin-left: 20px; margin-top: 15px; padding: 25px; }
        .patogeno-min-card { border: 1px solid #ffc107; background: #fffdf5; margin-left: 40px; margin-top: 10px; padding: 15px; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button class="tab-button active btn-ed1" onclick="openTab(event, 'editor1')">Editor 1: Banco de Patógenos</button>
        <button class="tab-button btn-ed2" onclick="openTab(event, 'editor2')">Editor 2: Risco de Doenças</button>
    </div>

    <div class="container">
        
        <div id="editor1" class="tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Banco de Biocontroladores (Técnico)</h2>
                <div>
                    <input type="file" id="fileLoad1" style="display:none" onchange="handleFileLoad1(event)">
                    <button class="btn-load" onclick="document.getElementById('fileLoad1').click()">Carregar JSON</button>
                    <button class="btn-save" onclick="salvarEditor1()">Salvar Patógenos</button>
                </div>
            </div>
            <div id="ed1-container"></div>
            <button class="btn-add" style="background: var(--accent-ed1);" onclick="adicionarPatCompleto()">+ Novo Patógeno Técnico</button>
        </div>

        <div id="editor2" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Banco de Dados de Doenças (Epidemiologia)</h2>
                <div>
                    <input type="file" id="fileLoad2" style="display:none" onchange="handleFileLoad2(event)">
                    <button class="btn-load" onclick="document.getElementById('fileLoad2').click()">Carregar JSON</button>
                    <button class="btn-save" onclick="salvarEditor2()">Salvar Doenças</button>
                </div>
            </div>
            <div id="ed2-container"></div>
            <button class="btn-add" style="background: var(--accent-ed2);" onclick="adicionarDoenca()">+ Adicionar Nova Doença</button>
        </div>

    </div>

    <script>
        // --- GERAL ---
        function openTab(evt, tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        function download(obj, filename) {
            const blob = new Blob([JSON.stringify(obj, null, 2)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = filename; a.click();
        }

        // --- LÓGICA EDITOR 1 ---
        let bancoPatogenos = [];
        function renderizarEditor1() {
            const container = document.getElementById('ed1-container');
            container.innerHTML = '';
            bancoPatogenos.forEach((pat, idx) => {
                const bio = pat.BiocontroladoresPatogenos[0] || {};
                container.innerHTML += `
                    <div class="section patogeno-full-card">
                        <button class="btn-remove" onclick="removerPatEd1(${idx})">Remover</button>
                        <div class="grid-params">
                            <div class="form-group"><label>Nome</label><input type="text" value="${pat.NomePatogeno}" onchange="bancoPatogenos[${idx}].NomePatogeno=this.value"></div>
                            <div class="form-group"><label>Tipo</label><input type="text" value="${pat.TipoPatogeno}" onchange="bancoPatogenos[${idx}].TipoPatogeno=this.value"></div>
                        </div>
                        <div class="grid-params">
                            <div class="form-group"><label>Comerciais</label><textarea onchange="updateEd1Array(${idx}, 'ComerciaisEspecificos', this.value)">${(bio.ComerciaisEspecificos || []).join('\n')}</textarea></div>
                            <div class="form-group"><label>Conservativos</label><textarea onchange="updateEd1Array(${idx}, 'ConservativosEspecificos', this.value)">${(bio.ConservativosEspecificos || []).join('\n')}</textarea></div>
                        </div>
                    </div>`;
            });
        }
        function updateEd1Array(idx, field, val) { bancoPatogenos[idx].BiocontroladoresPatogenos[0][field] = val.split('\n').filter(x => x.trim() !== ""); }
        function adicionarPatCompleto() { bancoPatogenos.push({ NomePatogeno: "Novo Patógeno", TipoPatogeno: "Fungo", BiocontroladoresPatogenos: [{ ComerciaisEspecificos: [], ConservativosEspecificos: [] }] }); renderizarEditor1(); }
        function removerPatEd1(idx) { if(confirm("Remover?")) { bancoPatogenos.splice(idx, 1); renderizarEditor1(); } }
        function handleFileLoad1(event) { const reader = new FileReader(); reader.onload = (e) => { bancoPatogenos = JSON.parse(e.target.result); renderizarEditor1(); }; reader.readAsText(event.target.files[0]); }
        function salvarEditor1() { download(bancoPatogenos, "banco_patogenos.json"); }

        // --- LÓGICA EDITOR 2 ---
        let doencasData = [];

        function renderizarEditor2() {
            const container = document.getElementById('ed2-container');
            container.innerHTML = '';
            doencasData.forEach((doenca, dIdx) => {
                let culturasHtml = '';
                doenca.CulturasAfetadas.forEach((cultura, cIdx) => {
                    let patogenosHtml = '';
                    cultura.DadosPatogenosAssociados.forEach((pat, pIdx) => {
                        patogenosHtml += `
                            <div class="patogeno-min-card">
                                <button class="btn-remove" onclick="removerEd2(${dIdx}, ${cIdx}, ${pIdx})">×</button>
                                <div class="grid-pat">
                                    <div class="form-group"><label>Nome</label><input type="text" value="${pat.NomePatogeno}" onchange="doencasData[${dIdx}].CulturasAfetadas[${cIdx}].DadosPatogenosAssociados[${pIdx}].NomePatogeno=this.value"></div>
                                    <div class="form-group"><label>Peso</label><input type="number" step="0.1" value="${pat.Peso}" onchange="doencasData[${dIdx}].CulturasAfetadas[${cIdx}].DadosPatogenosAssociados[${pIdx}].Peso=parseFloat(this.value)"></div>
                                    <div class="form-group"><label>Tipo</label><input type="text" value="${pat.TipoPatogeno}" onchange="doencasData[${dIdx}].CulturasAfetadas[${cIdx}].DadosPatogenosAssociados[${pIdx}].TipoPatogeno=this.value"></div>
                                </div>
                                <label>Sinônimos</label>
                                <textarea onchange="updateArrayEd2(${dIdx},${cIdx},${pIdx},'Sinonimos',this.value)">${(pat.Sinonimos || []).join('\n')}</textarea>
                            </div>`;
                    });

                    culturasHtml += `
                        <div class="cultura-section">
                            <button class="btn-remove" onclick="removerEd2(${dIdx}, ${cIdx})">Remover Cultura</button>
                            <h4>Cultura: <input type="text" value="${cultura.Cultura}" onchange="doencasData[${dIdx}].CulturasAfetadas[${cIdx}].Cultura=this.value" style="width: auto; min-width: 250px;"></h4>
                            
                            <div class="grid-params">
                                <div class="form-group"><label>Sintomas</label><textarea onchange="updateCultArray(${dIdx},${cIdx},'Sintomas',this.value)">${(cultura.Sintomas || []).join('\n')}</textarea></div>
                                <div class="form-group"><label>Condições Favoráveis</label><textarea onchange="updateCultArray(${dIdx},${cIdx},'CondicoesFavoraveis',this.value)">${(cultura.CondicoesFavoraveis || []).join('\n')}</textarea></div>
                                <div class="form-group"><label>Condições Agravantes</label><textarea onchange="updateCultArray(${dIdx},${cIdx},'CondicoesAgravantes',this.value)">${(cultura.CondicoesAgravantes || []).join('\n')}</textarea></div>
                                <div class="form-group"><label>Microrganismos Agravantes</label><textarea onchange="updateCultArray(${dIdx},${cIdx},'MicrorganimosAgravantes',this.value)">${(cultura.MicrorganimosAgravantes || []).join('\n')}</textarea></div>
                                <div class="form-group" style="grid-column: span 2;"><label>Índice Biocontrole Associado</label><textarea onchange="updateCultArray(${dIdx},${cIdx},'IndiceBiocontroleAssociado',this.value)">${(cultura.IndiceBiocontroleAssociado || []).join('\n')}</textarea></div>
                            </div>

                            <div id="pats-at-${dIdx}-${cIdx}">${patogenosHtml}</div>
                            <button class="btn-add" style="background:#3f79ff; margin-top:10px;" onclick="adicionarEd2Pat(${dIdx}, ${cIdx})">+ Patógeno Associado</button>
                        </div>`;
                });

                container.innerHTML += `
                    <div class="section doenca-section">
                        <button class="btn-remove" onclick="removerEd2(${dIdx})">Remover Doença</button>
                        <h3>Doença: <input type="text" value="${doenca.NomeDoenca}" onchange="doencasData[${dIdx}].NomeDoenca=this.value" style="width: 300px; font-weight:bold;"></h3>
                        <div class="form-group">Data: <input type="text" value="${doenca.DataCriacao}" style="width:120px" onchange="doencasData[${dIdx}].DataCriacao=this.value"></div>
                        ${culturasHtml}
                        <button class="btn-add" style="background:var(--success); margin-top:10px;" onclick="adicionarCultura(${dIdx})">+ Adicionar Cultura Afetada</button>
                    </div>`;
            });
        }

        function updateArrayEd2(d, c, p, field, val) { doencasData[d].CulturasAfetadas[c].DadosPatogenosAssociados[p][field] = val.split('\n').filter(x => x.trim() !== ""); }
        function updateCultArray(d, c, field, val) { doencasData[d].CulturasAfetadas[c][field] = val.split('\n').filter(x => x.trim() !== ""); }

        function adicionarDoenca() { doencasData.push({ NomeDoenca: "Nova Doença", DataCriacao: new Date().toLocaleDateString('pt-BR'), CulturasAfetadas: [] }); renderizarEditor2(); }
        function adicionarCultura(dIdx) { doencasData[dIdx].CulturasAfetadas.push({ Cultura: "", Sintomas: [], CondicoesFavoraveis: [], CondicoesAgravantes: [], MicrorganimosAgravantes: [], IndiceBiocontroleAssociado: [], DadosPatogenosAssociados: [] }); renderizarEditor2(); }
        function adicionarEd2Pat(dIdx, cIdx) { doencasData[dIdx].CulturasAfetadas[cIdx].DadosPatogenosAssociados.push({ NomePatogeno: "", TipoPatogeno: "", Peso: 0, Sinonimos: [], MicrorganimosAgonistas: [], IndiceAssociado: [] }); renderizarEditor2(); }
        function removerEd2(d, c, p) { if(!confirm("Remover?")) return; if(p !== undefined) doencasData[d].CulturasAfetadas[c].DadosPatogenosAssociados.splice(p, 1); else if(c !== undefined) doencasData[d].CulturasAfetadas.splice(c, 1); else doencasData.splice(d, 1); renderizarEditor2(); }
        function handleFileLoad2(event) { const reader = new FileReader(); reader.onload = (e) => { doencasData = JSON.parse(e.target.result); renderizarEditor2(); }; reader.readAsText(event.target.files[0]); }
        function salvarEditor2() { download(doencasData, "banco_doencas.json"); }

        window.onload = () => { adicionarPatCompleto(); adicionarDoenca(); };
    </script>
</body>
</html>
