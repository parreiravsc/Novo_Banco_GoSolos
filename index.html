<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Patógenos JSON</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --accent: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --border: #dcdde1;
            --label-patho: #8e44ad;
            --label-bio: #16a085;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--bg);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-load { background-color: var(--accent); color: white; }
        .btn-save { background-color: var(--success); color: white; }
        .btn-add { background-color: var(--primary); color: white; font-size: 12px; margin-top: 5px; }
        .btn-remove { background-color: var(--danger); color: white; padding: 2px 8px; margin-left: 5px; }

        .section {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid var(--border);
        }

        .sec-patogeno { border-left-color: var(--label-patho); background: #f9f4fc; }
        .sec-biocontrol { border-left-color: var(--label-bio); background: #f0f9f7; }

        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; color: #555; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 4px;
            box-sizing: border-box;
        }

        .list-container {
            background: rgba(255,255,255,0.6);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .list-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .list-item input { margin-bottom: 0; flex-grow: 1; }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Editor de Dados Fitopatológicos</h1>

    <div class="toolbar">
        <button class="btn-load" onclick="document.getElementById('fileInput').click()">Carregar JSON</button>
        <button class="btn-save" onclick="downloadJSON()">Baixar JSON Atualizado</button>
        <input type="file" id="fileInput" accept=".json" onchange="loadFile(event)">
    </div>

    <div id="editor-form">
        <div class="section sec-patogeno">
            <div class="grid-2">
                <div>
                    <label>Nome do Patógeno</label>
                    <input type="text" id="NomePatogeno" placeholder="Ex: Fusarium oxysporum">
                </div>
                <div>
                    <label>Tipo de Patógeno</label>
                    <input type="text" id="TipoPatogeno" placeholder="Ex: Fungo">
                </div>
            </div>

            <label>Sinônimos</label>
            <div id="Sinonimos-list" class="list-container"></div>
            <button class="btn-add" onclick="addItem('Sinonimos-list')">+ Adicionar Sinônimo</button>
        </div>

        <div class="section">
            <label>Microrganismos Agonistas</label>
            <div id="MicrorganimosAgonistas-list" class="list-container"></div>
            <button class="btn-add" onclick="addItem('MicrorganimosAgonistas-list')">+ Adicionar Agonista</button>
        </div>

        <div class="section sec-biocontrol">
            <h3>Biocontroladores Patógenos</h3>
            <div class="grid-2">
                <div>
                    <label>Comerciais Específicos</label>
                    <div id="ComerciaisEspecificos-list" class="list-container"></div>
                    <button class="btn-add" onclick="addItem('ComerciaisEspecificos-list')">+ Novo Comercial</button>
                </div>
                <div>
                    <label>Conservativos Específicos</label>
                    <div id="ConservativosEspecificos-list" class="list-container"></div>
                    <button class="btn-add" onclick="addItem('ConservativosEspecificos-list')">+ Novo Conservativo</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Função para adicionar um campo de input na lista
    function addItem(containerId, value = "") {
        const container = document.getElementById(containerId);
        const div = document.createElement('div');
        div.className = 'list-item';
        
        const input = document.createElement('input');
        input.type = 'text';
        input.value = value;
        input.className = 'list-input';

        const btnDel = document.createElement('button');
        btnDel.innerHTML = '&times;';
        btnDel.className = 'btn-remove';
        btnDel.onclick = () => div.remove();

        div.appendChild(input);
        div.appendChild(btnDel);
        container.appendChild(div);
    }

    // Carregar arquivo JSON
    function loadFile(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const data = JSON.parse(reader.result);
            populateForm(data);
        };
        reader.readAsText(event.target.files[0]);
    }

    // Preencher o formulário com dados do JSON
    function populateForm(data) {
        document.getElementById('NomePatogeno').value = data.NomePatogeno || "";
        document.getElementById('TipoPatogeno').value = data.TipoPatogeno || "";
        
        // Limpar listas antes de popular
        const lists = ['Sinonimos-list', 'MicrorganimosAgonistas-list', 'ComerciaisEspecificos-list', 'ConservativosEspecificos-list'];
        lists.forEach(id => document.getElementById(id).innerHTML = "");

        if(data.Sinonimos) data.Sinonimos.forEach(v => addItem('Sinonimos-list', v));
        if(data.MicrorganimosAgonistas) data.MicrorganimosAgonistas.forEach(v => addItem('MicrorganimosAgonistas-list', v));

        if(data.BiocontroladoresPatogenos && data.BiocontroladoresPatogenos[0]) {
            const bio = data.BiocontroladoresPatogenos[0];
            if(bio.ComerciaisEspecificos) bio.ComerciaisEspecificos.forEach(v => addItem('ComerciaisEspecificos-list', v));
            if(bio.ConservativosEspecificos) bio.ConservativosEspecificos.forEach(v => addItem('ConservativosEspecificos-list', v));
        }
    }

    // Coletar dados e gerar arquivo para baixar
    function downloadJSON() {
        const getListValues = (id) => {
            return Array.from(document.querySelectorAll(`#${id} .list-input`))
                        .map(input => input.value)
                        .filter(val => val.trim() !== "");
        };

        const jsonOutput = {
            "NomePatogeno": document.getElementById('NomePatogeno').value,
            "TipoPatogeno": document.getElementById('TipoPatogeno').value,
            "Sinonimos": getListValues('Sinonimos-list'),
            "MicrorganimosAgonistas": getListValues('MicrorganimosAgonistas-list'),
            "BiocontroladoresPatogenos": [
                {
                    "ComerciaisEspecificos": getListValues('ComerciaisEspecificos-list'),
                    "ConservativosEspecificos": getListValues('ConservativosEspecificos-list')
                }
            ]
        };

        const blob = new Blob([JSON.stringify(jsonOutput, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "dados_patogeno.json";
        a.click();
    }
</script>

</body>
</html>
